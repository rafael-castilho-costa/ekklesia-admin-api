server:
  port: 8081

spring:
  application:
    name: ekklesia-admin-api
  profiles:
    default: dev

jwt:
  secret: ${JWT_SECRET:change-this-secret-key-with-at-least-32-bytes}
  expirationMs: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger
