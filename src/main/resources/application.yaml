server:
  port:8080

spring:
  application:
    name: ekklesia-admin-api
  datasource:
    url: jdbc:postgresql://localhost:5432/ekklesia_admin
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
      open-in-view: false

    flyway:
      enabled: true
      locations: classpath:db/migration

    jackson:
      serialization:
        WRITE_DATES_AS_TIMESTAMPS: false
logging:
  level:
    root: INFO
    org.springframework.security: DEBUG

jwt:
  secret: your-super-secret-key-change-this
  expiration: 86400000 # 1 dia em ms

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger
