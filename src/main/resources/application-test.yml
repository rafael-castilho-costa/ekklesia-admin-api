spring:
  datasource:
    url: jdbc:h2:mem:ekklesia_admin_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-with-at-least-32-bytes
  expirationMs: 3600000

logging:
  level:
    root: WARN
