spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ekklesia_admin
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    org.springframework.security: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:3000

jwt:
  secret: "k9G2+fR8Xy7p3vQq4W8sT2bN1yV6cR0dH5LqP4jK8sM="        # deve ter >=32 caracteres
  expirationMs: 3600000
